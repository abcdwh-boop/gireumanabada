<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 나무</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif; background: #eef5e9; overflow: hidden; }
    .stage { position: relative; width: 100vw; height: 100vh; }
    svg { width: 100%; height: 100%; display: block; }
    .topbar { position: absolute; top: 20px; left: 0; right: 0; display: flex; align-items: flex-start; justify-content: space-between; padding: 0 30px; pointer-events: none; }
    .title { font-size: 34px; font-weight: 800; color: #25402c; line-height: 1.2; }
    .title small { display: block; font-size: 18px; font-weight: 700; color: #5a8a63; margin-top: 4px; }
    .picker { pointer-events: auto; }
    .picker select { font-size: 18px; padding: 8px 14px; border-radius: 10px; border: 1px solid #b8cdb8; background: #fff; font-weight: 700; color: #25402c; }
    .stat { position: absolute; bottom: 26px; left: 0; right: 0; text-align: center; }
    .stat .big { font-size: 32px; font-weight: 800; color: #2d5f3f; }
    .stat .sub { font-size: 18px; color: #5a8a63; }
    .leaf-inner { transform-box: fill-box; transform-origin: 50% 100%; }
    .leaf-new { animation: sprout .6s cubic-bezier(.2,1.5,.4,1) both; }
    @keyframes sprout { 0% { transform: scale(.05); opacity: 0; } 55% { opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  
/* 잎 살랑살랑 흔들림 */
.leaf-sway {
  transform-box: fill-box;          /* 잎 자기 영역 기준으로 회전 */
  transform-origin: 50% 100%;       /* 잎 밑동(줄기)을 축으로 */
  animation: leafSway 3.4s ease-in-out infinite;
}
@keyframes leafSway {
  0%, 100% { transform: rotate(-3.5deg); }
  50%      { transform: rotate(3.5deg); }
}
/* 멀미 방지 설정을 켠 기기에선 자동으로 멈춤 */
@media (prefers-reduced-motion: reduce) {
  .leaf-sway { animation: none; }
}


  </style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 1000 720" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f6fbf2"/>
          <stop offset="1" stop-color="#e0efd7"/>
        </linearGradient>
      </defs>
      <rect width="1000" height="720" fill="url(#sky)"/>
      <ellipse cx="500" cy="700" rx="300" ry="22" fill="#cbe3ba"/>
      <g id="branches"></g>
      <g id="leaves"></g>
    </svg>

    <div class="topbar">
      <div class="title">우리반 아나바다 나무<small id="treeLabel">불러오는 중…</small></div>
      <div class="picker"><select id="classSel"></select></div>
    </div>
    <div class="stat">
      <span class="big"><span id="leafCount">0</span>장</span>
      <span class="sub">· 거래로 모은 리프 <span id="leafTotal">0</span></span>
    </div>
  </div>

  <script type="module" src="./js/tree.js"></script>
</body>
</html>
