<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 나무</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif; background: #eaf3e6; overflow: hidden; }
    .stage { position: relative; width: 100vw; height: 100vh; }
    svg { width: 100%; height: 100%; display: block; }
    .topbar { position: absolute; top: 20px; left: 0; right: 0; display: flex; align-items: flex-start; justify-content: space-between; padding: 0 30px; pointer-events: none; }
    .title { font-size: 34px; font-weight: 800; color: #25402c; line-height: 1.2; }
    .title small { display: block; font-size: 18px; font-weight: 700; color: #5a8a63; margin-top: 4px; }
    .picker { pointer-events: auto; }
    .picker select { font-size: 18px; padding: 8px 14px; border-radius: 10px; border: 1px solid #b8cdb8; background: #fff; font-weight: 700; color: #25402c; }
    .stat { position: absolute; bottom: 28px; left: 0; right: 0; text-align: center; }
    .stat .big { font-size: 32px; font-weight: 800; color: #2d5f3f; }
    .stat .sub { font-size: 18px; color: #5a8a63; }
    .leaf-inner { transform-box: fill-box; transform-origin: 50% 100%; }
    .leaf-new { animation: sprout .6s cubic-bezier(.2,1.5,.4,1) both; }
    @keyframes sprout { 0% { transform: scale(.05); opacity: 0; } 55% { opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f4faef"/>
          <stop offset="1" stop-color="#dcefd4"/>
        </linearGradient>
      </defs>
      <rect width="1000" height="700" fill="url(#sky)"/>
      <ellipse cx="500" cy="662" rx="370" ry="34" fill="#cbe3ba"/>
      <!-- 나무 골격 -->
      <g stroke="#6b4a2b" stroke-linecap="round" fill="none">
        <path d="M500,645 L500,360" stroke-width="34"/>
        <path d="M500,470 C470,430 430,410 380,398" stroke-width="17"/>
        <path d="M500,445 C535,408 575,390 628,380" stroke-width="17"/>
        <path d="M500,400 C485,360 470,330 455,300" stroke-width="14"/>
        <path d="M500,395 C520,360 540,335 560,308" stroke-width="14"/>
        <path d="M500,360 C500,335 500,312 500,290" stroke-width="13"/>
        <path d="M455,300 C440,285 425,276 410,268" stroke-width="8"/>
        <path d="M560,308 C575,292 590,284 606,277" stroke-width="8"/>
      </g>
      <g id="leaves"></g>
    </svg>

    <div class="topbar">
      <div class="title">길음중 아나바다 나무<small id="treeLabel">불러오는 중…</small></div>
      <div class="picker"><select id="classSel"></select></div>
    </div>
    <div class="stat">
      <span class="big"><span id="leafCount">0</span>장</span>
      <span class="sub">· 거래로 모은 리프 <span id="leafTotal">0</span></span>
    </div>
  </div>

  <script type="module" src="./js/tree.js"></script>
</body>
</html>
