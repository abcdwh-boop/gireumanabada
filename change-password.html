<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>비밀번호 설정</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="login-screen">
    <header class="login-header">
      <h1>비밀번호<br>설정</h1>
      <p class="subtitle">처음 로그인하셨네요. 새 비밀번호를 정해주세요.</p>
    </header>

    <form id="pwForm" class="login-form">
      <label>
        <span>새 비밀번호 (6자 이상)</span>
        <input type="password" id="pw1" required>
      </label>
      <label>
        <span>새 비밀번호 확인</span>
        <input type="password" id="pw2" required>
      </label>
      <button type="submit" class="btn-primary">저장하고 시작하기</button>
      <p id="message" class="message"></p>
    </form>
  </main>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { changePassword } from './js/auth.js';

    // 로그인 안 한 채 들어오면 로그인 화면으로
    onAuthStateChanged(auth, (user) => { if(!user) window.location.href = "index.html"; });

    const form = document.getElementById("pwForm");
    const msg  = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      const p1 = document.getElementById("pw1").value;
      const p2 = document.getElementById("pw2").value;
      if(p1.length < 6){ msg.textContent = "비밀번호는 6자 이상이어야 합니다."; return; }
      if(p1 !== p2){ msg.textContent = "두 비밀번호가 다릅니다."; return; }
      if(p1 === "000000"){ msg.textContent = "초기 비밀번호와 다르게 정해주세요."; return; }
      try {
        await changePassword(p1);
        window.location.href = "main.html";
      } catch(err){
        msg.textContent = "오류: " + (err.code || err.message);
      }
    });
  </script>
</body>
</html>
