<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>시장 구경</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #marketBanner{
      display:none; margin:10px 0; padding:12px 14px; border-radius:10px;
      font-size:16px; font-weight:800; text-align:center; color:#fff; letter-spacing:.5px;
    }
    #toTopBtn{
      position:fixed; right:16px; bottom:20px; width:50px; height:50px; border-radius:50%;
      border:none; background:#2d5f3f; color:#fff; font-size:22px; line-height:1;
      box-shadow:0 3px 10px rgba(0,0,0,.25); cursor:pointer; display:none; z-index:50;
    }
  </style>
</head>
<body>
  <main class="app-screen">
    <div class="page-top">
      <button class="back-link" onclick="location.href='main.html'">← 메인으로</button>
    </div>
    <div class="page-title">시장 구경</div>

    <div id="marketBanner"></div>
    <p id="notice" class="greeting"></p>

    <div class="toolbar">
      <input type="text" id="search" placeholder="물품명 검색">
      <select id="catFilter"><option value="">전체 구분</option></select>
      <button id="refreshBtn" class="refresh-btn" title="새로고침">↻</button>
    </div>

    <div id="list">불러오는 중…</div>
  </main>

  <button id="toTopBtn" aria-label="맨 위로">↑</button>

  <script type="module" src="./js/market.js"></script>
  <script>
    (function(){
      const btn = document.getElementById("toTopBtn");
      const main = document.querySelector("main");
      const pos = () => window.scrollY || (main ? main.scrollTop : 0);
      const onScroll = () => { btn.style.display = pos() > 300 ? "block" : "none"; };
      window.addEventListener("scroll", onScroll, { passive:true });
      if(main) main.addEventListener("scroll", onScroll, { passive:true });
      btn.addEventListener("click", () => {
        window.scrollTo({ top:0, behavior:"smooth" });
        if(main) main.scrollTo({ top:0, behavior:"smooth" });
      });
    })();
  </script>
</body>
</html>
