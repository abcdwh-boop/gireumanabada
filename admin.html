<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 명단 업로드</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-wrap { max-width: 560px; margin: 0 auto; padding: 24px; }
    .admin-wrap h1 { font-size: 22px; color: #2d5f3f; margin-bottom: 8px; }
    .admin-wrap .desc { font-size: 14px; color: #6b7c6b; margin-bottom: 20px; }
    .upload-box { border: 2px dashed #b9c7b9; border-radius: 10px; padding: 20px; background:#fafbfa; }
    .upload-box input[type=file] { width: 100%; margin-bottom: 12px; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-row button { flex:1; min-width:160px; }
    .btn-sub { height:50px; border:none; border-radius:8px; background:#5a7a5a; color:#fff;
               font-size:15px; font-weight:700; cursor:pointer; }
    #log { margin-top: 16px; font-size: 13px; background:#0f172a; color:#cbd5e1;
           padding:12px; border-radius:8px; height: 260px; overflow:auto;
           white-space: pre-wrap; font-family: ui-monospace, monospace; }
    .summary { font-weight: 700; margin-top: 12px; color:#2d5f3f; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <h1>관리자 도구 (임시)</h1>
    <p class="desc">CSV로 <b>익명 계정(ID·학년·반만)</b>을 만듭니다.
       이름·출석번호 같은 개인정보는 저장하지 않아요.
       초기 비밀번호는 <b>000000</b>입니다. 많은 인원은 천천히 만들며, 멈추면 다시 ①을 누르면 이어서 됩니다.</p>

    <div class="upload-box">
      <input type="file" id="csvFile" accept=".csv,text/csv">
      <div class="btn-row">
        <button id="uploadBtn" class="btn-primary">① CSV 업로드</button>
        <button id="repairBtn" class="btn-sub">② 기본 3G 보정</button>
      </div>
    </div>

    <div id="summary" class="summary"></div>
    <div id="log"></div>
  </div>

  <script type="module">
    import { db, firebaseConfig } from './js/firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc, updateDoc, collection, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const DOMAIN = "gireum.sen.ms.kr";
    const INIT_PASSWORD = "000000";
    const DELAY_MS = 350;          // 계정 사이 간격
    const MAX_RETRY = 3;           // 한도 걸렸을 때 재시도 횟수
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    const secondaryApp  = initializeApp(firebaseConfig, "Uploader");
    const secondaryAuth = getAuth(secondaryApp);

    const logEl = document.getElementById("log");
    const summaryEl = document.getElementById("summary");
    const log = (m) => { logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };

    function parseCSV(text){
      text = text.replace(/^\uFEFF/, "");
      const lines = text.split(/\r\n|\n|\r/).filter(l => l.trim() !== "");
      const rows = lines.map(l => l.split(",").map(c => c.trim()));
      rows.shift();   // 헤더 줄 버림
      return rows;
    }

    // ── ① CSV 업로드 (컬럼: studentId, grade, classNo, groupId, role) ──
    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const file = document.getElementById("csvFile").files[0];
      if(!file){ alert("CSV 파일을 먼저 고르세요."); return; }
      logEl.textContent = ""; summaryEl.textContent = "";
      const rows = parseCSV(await file.text());
      log(`총 ${rows.length}줄 읽음.`);

      // 이미 만들어진 ID 미리 확인 → 재실행 시 그건 건너뜀(한도 절약)
      log("기존 계정 확인 중…");
      const existing = new Set();
      try {
        const usnap = await getDocs(collection(db, "users"));
        usnap.forEach(d => { const s = d.data().studentId; if(s) existing.add(String(s).toLowerCase()); });
        log(`이미 ${existing.size}개 있음 → 그건 건너뜀.\n`);
      } catch(e){ log(`(기존 확인 실패: ${e.code || e.message} — 그냥 진행)\n`); }

      let ok = 0, skip = 0, fail = 0;
      for(let i = 0; i < rows.length; i++){
        const [studentId, grade, classNo, groupId, role] = rows[i];
        if(!studentId){ skip++; continue; }
        if(existing.has(studentId.toLowerCase())){ skip++; continue; }   // 이미 있음

        const email = `${studentId}@${DOMAIN}`;
        const roleNorm = (role || "").trim().toLowerCase();
        const codePart = studentId.replace(/^[0-9]+/, "");
        const name = (roleNorm === "admin") ? "관리자" : (codePart || studentId);

        let attempt = 0, done = false;
        while(!done){
          try {
            const cred = await createUserWithEmailAndPassword(secondaryAuth, email, INIT_PASSWORD);
            await setDoc(doc(db, "users", cred.user.uid), {
              studentId, name,
              grade: Number(grade), classNo: Number(classNo),
              groupId,
              role: roleNorm || "student",
              balance: (roleNorm === "admin") ? 0 : 3,
              leaf: 0, tradeCount: 0,
              mustChangePassword: true,
              wishlist: []
            });
            await signOut(secondaryAuth);
            log(`✅ ${studentId} (${roleNorm || "student"})`);
            ok++; done = true;
          } catch(e){
            if(e.code === "auth/email-already-in-use"){ log(`⚠️ 이미 있음: ${studentId}`); skip++; done = true; }
            else if(e.code === "auth/too-many-requests"){
              attempt++;
              if(attempt > MAX_RETRY){
                log(`\n🛑 요청 한도에 막혔어요. 여기까지 저장됨.`);
                summaryEl.textContent = `중단: 성공 ${ok} / 건너뜀 ${skip}. 30~60분 뒤 다시 ①을 누르면 남은 것부터 이어서 만듭니다.`;
                return;
              }
              const wait = 60 * attempt;   // 60s, 120s, 180s
              log(`⏳ 한도 — ${wait}초 쉬고 재시도 (${attempt}/${MAX_RETRY})`);
              await sleep(wait * 1000);
            }
            else { log(`❌ 실패: ${studentId} → ${e.code || e.message}`); fail++; done = true; }
          }
        }
        await sleep(DELAY_MS);
      }
      summaryEl.textContent = `완료: 성공 ${ok} / 건너뜀 ${skip} / 실패 ${fail}`;
    });

    // ── ② 기본 3G 보정 ──
    document.getElementById("repairBtn").addEventListener("click", async () => {
      logEl.textContent = ""; summaryEl.textContent = "";
      log("기본 캐시 보정 시작...\n");
      const snap = await getDocs(collection(db, "users"));
      let fixed = 0, skipped = 0;
      for(const d of snap.docs){
        const u = d.data();
        const role = (u.role || "").trim().toLowerCase();
        if(role === "admin"){ skipped++; continue; }
        await updateDoc(doc(db, "users", d.id), { balance: 3 });
        fixed++;
      }
      summaryEl.textContent = `보정 완료: ${fixed}명 3G 지급 / 관리자 ${skipped}명 제외`;
    });
  </script>
</body>
</html>
